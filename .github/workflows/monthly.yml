name: 월간 시즌 콘텐츠 자동 생성

on:
  schedule:
    # 매월 1일 한국시간 09:00 (UTC 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 수동 트리거 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 시즌 콘텐츠 생성
        run: node _tools/generate-monthly.mjs

      - name: 자동 캐시 무효화 (모든 HTML 자산 ?v=HASH)
        run: node _tools/cache-bust.mjs

      - name: IndexNow ping (Bing/Naver/Yandex 즉시 통지)
        run: node _tools/indexnow.mjs

      - name: 커밋 + 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "auto: $(date +%Y년-%m월) 시즌 콘텐츠 자동 생성"
            git push
          fi
