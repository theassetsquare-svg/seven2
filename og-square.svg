  <text x="600" y="1130" text-anchor="middle" fill="#999999" font-family="'Noto Sans KR', sans-serif"
        font-size="32" font-weight="500">대전광역시 서구 둔산동 · 매일 20:00 ~ 05:00</text>
</svg>
