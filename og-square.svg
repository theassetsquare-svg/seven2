  <line x1="200" y1="580" x2="1000" y2="580" stroke="#ffd84d" stroke-width="3" opacity="0.4"/>

  <text x="600" y="690" text-anchor="middle" fill="#ffffff" font-family="'Noto Sans KR', sans-serif"
