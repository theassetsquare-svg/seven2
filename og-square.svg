  <text x="600" y="780" text-anchor="middle" fill="#cccccc" font-family="'Noto Sans KR', sans-serif"
        font-size="40" font-weight="500">24시간 친절상담 · 첫방문 안내</text>

  <rect x="200" y="870" width="800" height="180" rx="90" fill="url(#cta)"/>
  <text x="600" y="960" text-anchor="middle" fill="#ffffff" font-family="'Noto Sans KR', sans-serif"
