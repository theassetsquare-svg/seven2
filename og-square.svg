<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0810"/>
      <stop offset="50%" stop-color="#2a0a18"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2d55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd84d"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <ellipse cx="600" cy="450" rx="700" ry="500" fill="url(#glow)"/>

  <text x="600" y="200" text-anchor="middle" fill="#ffd84d" font-family="'Noto Sans KR', sans-serif"
        font-size="40" font-weight="700" letter-spacing="6">대전 둔산동 NO.1</text>

  <text x="600" y="380" text-anchor="middle" fill="#ffffff" font-family="'Black Han Sans', sans-serif"
